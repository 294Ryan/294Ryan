name: Update README Stats

on:
  schedule:
    - cron: '0 16 * * *'   # UTC 16:00 = 台北時間 00:00
  workflow_dispatch:        # 允許手動觸發

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run update script
        env:
          # 用 Personal Access Token（需 repo + read:user scope）
          # 存成 repo secret：Settings > Secrets and variables > Actions
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: python update.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --staged --quiet || git commit -m "chore: auto update profile stats [skip ci]"
          git push
